name: Run CI tests on a PR

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  tests:
    name: Run CI tests on a PR
    if: false
    uses: ./.github/workflows/ci-tests-minimal.yaml
    secrets: inherit