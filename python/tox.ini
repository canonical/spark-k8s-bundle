[tox]
skipsdist=True
skip_missing_interpreters = True
envlist =
    format
    lint
    unit
    integration-basic
    integration-bundle
    integration-sparkjob
    integration-kyuubi
    integration-object-storage
    integration-backup-restore

[vars]
src_path = {tox_root}/spark_test/
tests_path = {tox_root}/tests/
all_path = {[vars]src_path} {[vars]tests_path}
github_scripts_path = {tox_root}/../.github/scripts/
scripts_path = {tox_root}/scripts/
tf_modules_path = {tox_root}/../releases/

[testenv]
allowlist_externals = 
    poetry
    sg
    /bin/bash
set_env =
    PYTHONPATH = {tox_root}:{[vars]src_path}
    PYTHONBREAKPOINT=ipdb.set_trace
    PY_COLORS=1
    basic: TESTFILE=test_basic.py
    bundle: TESTFILE=test_bundle.py
    sparkjob: TESTFILE=test_spark_job.py
    kyuubi: TESTFILE=test_kyuubi.py
    object-storage: TESTFILE=test_object_storage.py
    backup-restore: TESTFILE=test_backup_restore.py
pass_env =
    PYTHONPATH
    USER
    AZURE_STORAGE_ACCOUNT
    AZURE_STORAGE_KEY
    S3_ACCESS_KEY
    S3_SECRET_KEY
    S3_SERVER_URL
deps = 
    poetry

[testenv:format]
description = Apply coding style standards to code
commands =
    poetry install --only fmt
    poetry run ruff format {[vars]all_path} {[vars]github_scripts_path} {[vars]scripts_path}
    /bin/bash -ec "find {[vars]tf_modules_path} -name '*.tf' -print0 | xargs -0 terraform fmt"


[testenv:lint]
description = Check code against coding style standards
commands =
    poetry install --only fmt,lint
    poetry run ruff check --fix {[vars]all_path} {[vars]github_scripts_path} {[vars]scripts_path}
    poetry run ruff format --check {[vars]all_path} {[vars]github_scripts_path} {[vars]scripts_path}
    poetry run codespell {[vars]all_path} pyproject.toml {[vars]github_scripts_path}
    poetry install --all-groups
    poetry run mypy {[vars]src_path}

[testenv:unit]
description = Run unit tests
commands =
    poetry install --with unit
    poetry run pytest tests/unit

[testenv:integration-{basic,bundle,sparkjob,kyuubi,object-storage,backup-restore}]
description = Run integration tests
set_env =
    IE_TEST=1
    KUBECONFIG={env:HOME}/.kube/config
    {[testenv]set_env}
pass_env =
    {[testenv]pass_env}
    CI
commands =
    poetry install --with integration
    poetry run pytest -vv --tb native --log-cli-level=INFO -s {[vars]tests_path}/integration/{env:TESTFILE} {posargs} -x

[testenv:uat]
description = Run UAT tests (orchestrated integration test sequence in single venv)
set_env =
    IE_TEST=1
    KUBECONFIG={env:HOME}/.kube/config
    {[testenv]set_env}
pass_env =
    {[testenv]pass_env}
    CI
allowlist_externals =
    {[testenv]allowlist_externals}
commands =
    poetry install --with integration
    /bin/bash {[vars]scripts_path}/run_uat_tests.sh {[vars]tests_path}/integration {posargs}

[testenv:benchmarks]
description = Run benchmarks
set_env =
    IE_TEST=1
    KUBECONFIG={env:HOME}/.kube/config
    {[testenv]set_env}
pass_env =
    {[testenv]pass_env}
    CI
commands =
    poetry install --with integration,benchmark
    poetry run pytest -vv --tb native --log-cli-level=INFO -s {[vars]tests_path}/integration/bench/test_benchmark_kyuubi.py {posargs} -x

[testenv:tfinputs]
description = Parse TF variables.tf file into a table
pass_env =
    {[testenv]pass_env}
commands =
    pip install python-hcl2
    python scripts/tf_inputs.py

[testenv:tutorial-extract]
description = Generate tutorial test scripts from Markdown sources
allowlist_externals =
    python3
change_dir = {tox_root}/..
commands =
    python3 python/tests/tutorial/extract_commands.py docs/tutorial/ python/tests/tutorial/

[testenv:tutorial]
description = Generate tutorial test scripts and run the Spread test suite
allowlist_externals =
    python3
    spread
change_dir = {tox_root}/..
commands =
    python3 python/tests/tutorial/extract_commands.py docs/tutorial/ python/tests/tutorial/
    spread -vv multipass:ubuntu-24.04-64:python/tests/tutorial/
